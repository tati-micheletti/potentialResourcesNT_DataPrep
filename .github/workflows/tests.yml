name: Tests and Coverage

on:
  push:
    branches: [main, Testing]
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode (light skips heavy/long cases)"
        required: false
        default: light
        type: choice
        options: [light, heavy]

env:
  COVERAGE_MIN: 70
  HEAVY_TESTS: ""
  AGGREGATE_REPO: RonCatK/RonCatK-anthroDisturbance_Thesis
  NOT_CRAN: true
  R_PROFILE_USER: /dev/null
  R_PROFILE: /dev/null
  R_ENVIRON_USER: /dev/null
  R_ENVIRON: /dev/null

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev \
            gdal-bin \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Set mode
        run: |
          MODE="${{ github.event.inputs.mode || 'light' }}"
          [ -z "$MODE" ] && MODE="light"
          echo "MODE=$MODE" >> "$GITHUB_ENV"

      - name: Prepare R library path
        run: |
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlibs" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/Rlibs"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Pre-install Require (vanilla)
        run: |
          Rscript --vanilla - <<'RS'
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          if (!requireNamespace("Require", quietly = TRUE)) install.packages("Require")
          if (!requireNamespace("Require", quietly = TRUE)) quit(status = 1)
          RS

      - name: Install light dependencies
        run: |
          Rscript --vanilla - <<'RS'
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/2026-01-05"))
          cran_packages <- c(
            "covr", "testthat", "withr", "terra", "data.table",
            "Require", "mockery", "DT", "htmltools", "htmlwidgets",
            "qs", "sf", "xml2", "BH", "RApiSerialize", "Rcpp",
            "RcppParallel", "stringfish", "stringi", "zip", "googledrive",
            "rlang", "vctrs", "pillar", "purrr", "tibble"
          )
          missing <- cran_packages[!vapply(cran_packages, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) install.packages(missing)
          RS

      - name: Ensure Require present
        run: |
          Rscript - <<'RS'
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          if (!requireNamespace("Require", quietly = TRUE)) install.packages("Require")
          if (!requireNamespace("Require", quietly = TRUE)) quit(status = 1)
          RS

      - name: Run tests and coverage
        env:
          MODE: ${{ env.MODE }}
        run: |
          MODE=${MODE:-light}
          mkdir -p artifacts/tests/"$MODE"
          Rscript - <<'RS'
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/2026-01-05"))
          suppressPackageStartupMessages({
            pkgs <- c(
              "covr", "DT", "htmltools", "htmlwidgets",
              "testthat", "terra", "data.table",
              "Require", "mockery"
            )
            invisible(lapply(pkgs, library, character.only = TRUE))
          })
          mode <- Sys.getenv("MODE", "light")
          coverage_min <- as.numeric(Sys.getenv("COVERAGE_MIN", "0"))
          heavy_tests <- strsplit(Sys.getenv("HEAVY_TESTS", ""), ",", fixed = TRUE)[[1]]
          heavy_tests <- trimws(heavy_tests[heavy_tests != ""])

          report_dir <- normalizePath(file.path("artifacts", "tests", mode), mustWork = FALSE)
          dir.create(report_dir, recursive = TRUE, showWarnings = FALSE)

          test_dir <- file.path("tests", "testthat")
          test_files <- list.files(test_dir, pattern = "^test-.*\\.R$", full.names = TRUE)
          if (mode == "light" && length(heavy_tests)) {
            test_files <- test_files[!basename(test_files) %in% heavy_tests]
          }

          Paths <<- list(inputPath = tempdir(), outputPath = tempdir())
          r_scripts <- list.files("R", pattern = "\\.R$", full.names = TRUE)
          invisible(lapply(r_scripts, source))
          helper_files <- list.files(test_dir, pattern = "^helper-.*\\.R$", full.names = TRUE)
          if (length(helper_files)) lapply(helper_files, source)

          if (!length(test_files)) {
            writeLines("No tests selected for this mode.", file.path(report_dir, "tests.log"))
            quit(status = 0)
          }

          log_path <- file.path(report_dir, "tests.log")
          junit_path <- file.path(report_dir, "tests.xml")
          sink(log_path, split = TRUE)
          on.exit({ while (sink.number() > 0) sink() }, add = TRUE)

          if (!exists(".robustDigest", inherits = FALSE)) {
            assign(".robustDigest", digest::digest, envir = .GlobalEnv)
          }

          reporter <- testthat::MultiReporter$new(list(
            testthat::SummaryReporter$new(),
            testthat::JunitReporter$new(file = junit_path)
          ))
          for (tf in test_files) {
            testthat::test_file(
              tf,
              reporter = reporter,
              stop_on_failure = TRUE,
              stop_on_warning = FALSE
            )
          }

          cov <- covr::file_coverage(r_scripts, test_files)
          cov_pct <- covr::percent_coverage(cov)
          covr::report(cov, file = file.path(report_dir, "coverage.html"), browse = FALSE)
          writeLines(sprintf("coverage: %.2f%%", cov_pct), file.path(report_dir, "coverage.txt"))

          if (cov_pct < coverage_min) {
            stop(sprintf("Coverage %.2f%% below threshold %.2f%%", cov_pct, coverage_min))
          }
          RS

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-${{ env.MODE }}
          path: artifacts/tests/${{ env.MODE }}
          if-no-files-found: warn

      - name: Dispatch aggregator (optional)
        if: ${{ env.AGGREGATE_REPO != '' && env.MODE != '' }}
        env:
          AGGREGATOR_TOKEN: ${{ secrets.AGGREGATOR_TOKEN }}
        run: |
          if [ -z "$AGGREGATOR_TOKEN" ]; then
            echo "No AGGREGATOR_TOKEN provided; skipping dispatch."
            exit 0
          fi
          COVERAGE=$(grep -o '[0-9.]*' artifacts/tests/"$MODE"/coverage.txt | head -n1)
          payload=$(jq -n --arg module "potentialResourcesNT_DataPrep" --arg mode "$MODE" --arg coverage "$COVERAGE" '{module:$module,mode:$mode,coverage:$coverage}')
          curl -X POST \
            -H "Authorization: token $AGGREGATOR_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ env.AGGREGATE_REPO }}/dispatches \
            -d "{\"event_type\":\"module-ci-report\",\"client_payload\":$payload}"